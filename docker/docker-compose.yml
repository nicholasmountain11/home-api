version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../backend:/workspace
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
